<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <g fill="none" stroke="#c9a24b" stroke-width="1" stroke-opacity="0.5">
    <!-- eight-pointed star (khatam) -->
    <rect x="30" y="30" width="60" height="60" transform="rotate(45 60 60)"/>
    <rect x="30" y="30" width="60" height="60"/>
    <!-- connecting lattice -->
    <path d="M60 0 L60 30 M60 90 L60 120 M0 60 L30 60 M90 60 L120 60"/>
    <path d="M0 0 L30 30 M120 0 L90 30 M0 120 L30 90 M120 120 L90 90"/>
    <circle cx="60" cy="60" r="10"/>
  </g>
</svg>
